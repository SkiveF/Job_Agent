# ============================================
# CRITÈRES DE RECHERCHE D'EMPLOI
# Modifie ce fichier selon tes préférences
# ============================================

recherche:
  # Mots-clés pour la recherche (OR logic)
  mots_cles:
    - "data engineer"
    - "ingénieur data"
    - "data ingénieur"

  # Mots-clés à exclure
  mots_cles_exclus:
    - "stage"
    - "stagiaire"
    - "alternance"
    - "alternant"
    - "intern"
    - "internship"
    - "apprenti"

  # Localisation
  localisation:
    villes:
      - "Île-de-France"
    rayon_km: 30  # Rayon autour de la ville

  # Type de contrat
  type_contrat:
    - "CDI"
    # - "CDD"
    # - "Freelance"

  # Télétravail
  remote:
    accepte: true
    minimum: "partiel"  # "full" | "partiel" | "aucun"

  # Salaire
  salaire:
    minimum: 50000  # Salaire annuel brut minimum
    devise: "EUR"

  # Expérience
  experience:
    minimum: 0  # Années d'expérience minimum requise
    maximum: 10  # Ne pas postuler si > X ans demandés

  # Taille d'entreprise (optionnel)
  taille_entreprise:
    - "startup"
    - "PME"
    - "grande_entreprise"

  # Type d'entreprise : ESN/service vs client final
  # preference: "direct" (client final), "esn" (société de service), "tous" (pas de filtre)
  # eliminatoire: true → exclut complètement le type non souhaité
  #               false → juste un bonus/malus de ±5 points au score
  type_entreprise:
    preference: "direct"       # Préférer les clients finaux
    eliminatoire: true        # false = garde les ESN mais avec un malus

  # Date de publication max (en jours)
  anciennete_max_jours: 5

# Sites à scraper
sites:
  indeed:
    actif: true
    url_base: "https://fr.indeed.com"
    max_pages: 5
  wttj:
    actif: true
    url_base: "https://www.welcometothejungle.com"
    max_pages: 5

# Fréquence de scraping
planification:
  intervalle_heures: 6  # Scraper toutes les X heures
  heure_debut: "08:00"
  heure_fin: "22:00"
